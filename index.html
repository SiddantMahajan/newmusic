<html>

<head>
    <title>Home</title>
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body>



    <div class="row top">
        <div class="col-12 left">
            <audio id="audio" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

            <div class="navbar" id="navbar">

                <!-- COLLAPSED VIEW -->
                <div class="nav-content">
                    <span class="controlscollapsed">
                        <p>
                            <button class="control"><i class="fa-solid fa-angles-left"></i></button>
                            <button class="control" onclick="togglePlayPause()" id="play_small"><i
                                    class="fa-solid fa-play"></i></button>
                            <button class="control"><i class="fa-solid fa-angles-right"></i></button>
                        </p>
                    </span>

                    <div class="info">
                        <img src="https://i.ytimg.com/vi/cH7u10arGg0/hq720.jpg?sqp=-…BACGAY4AUAB&rs=AOn4CLA5xQ_paJfhXe2QntUS3YkETSrczg"
                            class="aart" crossorigin="anonymous" id="aart_coll">
                        <span class="nameandartist">
                            <p id="title_coll">Ed Sheeran - Sapphire (Lyric Video)</p>
                            <span style="display: inline;">
                            <p style="display: inline;" id="auth_coll">Ed Sheeran</p>
                            <span style="display: inline; float: right;">
                                <span id="current_coll">00:00</span> /
                                <span id="duration_coll">00:00</span>
                            </span>
                        </span>
                        </span>
                    </div>

                    <span class="expand" id="expandbutton" style="z-index: 1000;">
                        <p>
                            <button class="expandbutton"><i class="fa-solid fa-expand"></i></i></button>
                        </p>
                    </span>
                </div>

                <!-- EXPANDED VIEW -->
                <div class="menu" style="width: 100%;height: 100%;">
                    <div class="row" style="height: 100%; padding: 0;margin: 0;">
                        <div class="col-12 col-lg-4 playercont">
                            <div class="container-fluid" style="padding: 0;margin: 0;">
                                <div class="container-fluid aart_expanded_cont">
                                    <img src="https://i.ytimg.com/vi/cH7u10arGg0/hq720.jpg?sqp=-…BACGAY4AUAB&rs=AOn4CLA5xQ_paJfhXe2QntUS3YkETSrczg"
                                        class="aart_expanded" id="aart_expanded" crossorigin="anonymous">
                                </div>

                                <div class="container-fluid info_expanded_cont">
                                    <center>
                                        <p id="songname_ex">Ed Sheeran - Sapphire (Lyric Video)</p>
                                    </center>
                                    <center>
                                        <p id="auth_ex">Ed Sheeran</p>
                                    </center>
                                </div>

                                <div class="container-fluid seek_expanded_cont">

                                    <input type="range" min="0" max="100" value="50" class="seekslider" id="seek" />
                                    <div class="container-fluid timings">
                                        <p class="start" id="current">00:00</p>
                                        <p class="end" id="duration">00:00</p>
                                    </div>
                                </div>

                                <div class="container-fluid controls_expanded_cont">
                                    <button class="prev"><i class="fa-solid fa-angles-left"></i></button>
                                    <button class="play" id="play" onclick="togglePlayPause()"><i
                                            class="fa-solid fa-play"></i></button>
                                    <button class="next"><i class="fa-solid fa-angles-right"></i></button>
                                </div>
                            </div>
                        </div>
                        <div class="col-12 col-lg-2" style="height: 100%; padding: 0;margin: 0;">
                            <div id="player"></div>
                        </div>
                        <div class="col-12 col-lg-6" style="height: 100%; padding: 0;margin: 0;"></div>
                    </div>
                </div>

                <div class="close-btn" id="closeBtn"><i class="fa-solid fa-xmark"></i></div>

            </div>
            </center>
        </div>
    </div>

    <div class="row middle">
        <button style="width: 20%; height: 20%;" onclick="Authenticate()">Login Button</button>
        <button style="width: 20%; height: 20%;" onclick="setToken()">Login Button</button>
        <button style="width: 20%; height: 20%;" onclick="loadVideo('YyepU5ztLf4')">Test Button</button>

        <p style="color: aliceblue;" id="displayname">SSS</p>
    </div>

    <div class="row bottom">

        <div class="col-12 col-lg-4 offset-lg-4 nav">

            <div class="indicator"></div>
            <button class="navBtn" onclick="location.href='#a'">
                <i class="fa-solid fa-house"></i>
                <span>Home</span>
            </button>

            <button class="navBtn" onclick="location.href='#b'">
                <i class="fa-solid fa-compass"></i>
                <span>Explore</span>
            </button>

            <button class="navBtn" onclick="location.href='#c'">
                <i class="fa-solid fa-magnifying-glass"></i>
                <span>Search</span>
            </button>

            <button class="navBtn" onclick="location.href='#d'">
                <i class="fa-solid fa-bookmark"></i>
                <span>Library</span>
            </button>

            <button class="navBtn" onclick="location.href='#e'">
                <i class="fa-solid fa-radio"></i>
                <span>Radio</span>
            </button>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.2/color-thief.umd.js"></script>

    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
        integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy"
        crossorigin="anonymous"></script>
    <script src="script.js"></script>

</body>

</html>
